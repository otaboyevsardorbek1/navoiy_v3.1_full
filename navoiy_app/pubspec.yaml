name: navoiy_app
description: Alisher Navoiy asarlarini integratsion yondashuv asosida o'rganamiz
publish_to: 'none'
version: 2.0.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Navigation
  go_router: ^12.1.3

  # Local storage
  sqflite: ^2.3.2
  shared_preferences: ^2.2.2
  path: ^1.8.3
  path_provider: ^2.1.2

  # Network
  dio: ^5.4.0
  connectivity_plus: ^5.0.2

  # Auth & Security
  flutter_secure_storage: ^9.0.0
  crypto: ^3.0.3

  # UI
  google_fonts: ^6.1.0
  shimmer: ^3.0.0
  flutter_staggered_animations: ^1.1.1

  # Utils
  intl: ^0.19.0
  logger: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/manifest.json
    - assets/data/sherlar.json
    - assets/data/quizlar.json
    - assets/data/asarlar/hayrat-ul-abror.json
    - assets/data/asarlar/farhod-va-shirin.json
    - assets/data/asarlar/layli-va-majnun.json
    - assets/data/asarlar/sabai-sayyor.json
    - assets/data/asarlar/saddi-iskandariy.json
    - assets/data/asarlar/badoiy-ul-vasat.json
